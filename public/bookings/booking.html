<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings</title>
  <link rel="stylesheet" href="./booking.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>

<header>

  <!-- DESKTOP NAV -->
  <nav id="desktop-nav">
    <div class="logo">
      <a href="/index.html">
        <img src="/Images/Destinova (1).png" alt="Destinova logo" />
      </a>
    </div>

    <ul class="nav-links">
      <li><a href="/index.html#home">Home</a></li>
      <li><a href="/index.html#tours">Tours</a></li>
      <li><a href="/index.html#blogs">Blogs</a></li>
      <li><a href="/index.html#contactus">Contact Us</a></li>
    </ul>

    <div class="nav-actions">
      <span id="usernameDisplay" class="username" style="display:none;"></span>

      <a id="loginLink" class="action_btn" href="/loginpage/login.html">Login / Signup</a>

      <button id="logoutLink" class="action_btn" style="display:none; cursor:pointer;">
        Logout
      </button>
    </div>
  </nav>

  <!-- MOBILE NAV -->
  <nav id="ham-nav">
    <div class="logo">
      <a href="/index.html">
        <img src="/Images/Destinova (1).png" alt="Destinova logo" />
      </a>
    </div>

    <div id="ham-icon" class="ham-menu">
      <span></span><span></span><span></span>
    </div>

    <ul id="menu-links" class="menu-link">
      <li><a href="/index.html#home">Home</a></li>
      <li><a href="/index.html#tours">Tours</a></li>
      <li><a href="/index.html#blogs">Blogs</a></li>
      <li><a href="/index.html#contactus">Contact Us</a></li>

      <li id="usernameDisplayMobile" style="display:none;"></li>

      <li><a id="loginLinkMobile" href="/loginpage/login.html">Login / Signup</a></li>

      <li><button id="logoutLinkMobile" class="action_btn" style="display:none;">Logout</button></li>

    </ul>
  </nav>

</header>

<!-- MAIN CONTENT -->
<section class="hero">
    <h1 style="color: black;">My Bookings</h1>

    <div id="myBookings" class="bookings-wrapper"></div>
</section>



<footer class="site-footer">
  <p>© 2025 Destinova. All Rights Reserved.</p>
</footer>


<script>
const hamIcon = document.getElementById("ham-icon"); 
const menuLinks = document.getElementById("menu-links");

// Run hamburger + menu logic only if the elements exist
if (hamIcon && menuLinks) {

  // Toggle hamburger + menu panel
  hamIcon.addEventListener("click", () => {
    hamIcon.classList.toggle("active");
    menuLinks.classList.toggle("open"); 
  });

  // Close menu when clicking any nav link inside mobile menu
  document.querySelectorAll("#menu-links a").forEach(link => {
    link.addEventListener("click", () => {
      hamIcon.classList.remove("active");
      menuLinks.classList.remove("open"); 
    });
  });

  // Smooth scroll only when hamburger exists
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener("click", function (e) {
      const target = document.querySelector(this.getAttribute("href"));

      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: "smooth" });
      }

      // Close mobile panel after scrolling
      hamIcon.classList.remove("active");
      menuLinks.classList.remove("open");
    });
  });

}
</script>

<script type="module" src="../firebase.js"></script>
<script type="module" src="../authState.js"></script>
<script type="module" src="./booking.js"></script>


</body>
</html>

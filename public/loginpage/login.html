<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Destinova</title>
  <link rel="stylesheet" href="./login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>
<div class="login-container">

    <form id="login-form" class="login-box">
        <h2>Welcome Back</h2>
        <p>Login to continue your journey</p>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="links">
            <a href="#">Forgot password?</a>
            <p>Don’t have an account? <a href="../signuppage/sign.html">Sign up</a></p>
        </div>
    </form>

</div>

<script type="module" src="../firebase.js"></script>
<script type="module" src="../authState.js"></script>

<!-- UNIVERSAL NAV + HAMBURGER HANDLING -->
<script type="module" src="../script.js"></script>
<script type="module" src="../loginpage/login.js"></script> 

</body>
</html>
